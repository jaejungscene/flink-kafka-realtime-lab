name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  flink-job-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Test Flink job
        working-directory: flink-job
        run: mvn test

  docker-compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose file
        run: docker compose config
      - name: Validate compose file with optional profiles
        run: docker compose --profile schema --profile cdc --profile observability config

  python-and-k8s-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Compile Python tools
        run: python3 -m py_compile api/src/main.py generator/src/producer.py replayer/src/replay_dlq.py
      - name: Validate JSON schema and dashboard files
        run: |
          python3 - <<'PY'
          import json
          import pathlib

          paths = list(pathlib.Path("schemas").glob("*.avsc"))
          paths += [
              pathlib.Path("cdc/postgres-source-connector.json"),
              pathlib.Path("observability/grafana/dashboards/realtime-lab.json"),
          ]
          for path in paths:
              json.loads(path.read_text())
              print(f"json ok: {path}")
          PY
      - name: Validate shell scripts
        run: |
          bash -n scripts/create-topics.sh scripts/chaos-kill-taskmanager.sh scripts/flink-savepoint.sh
          sh -n scripts/register-schemas.sh cdc/register-postgres-connector.sh
      - name: Validate Markdown fences
        run: |
          for f in README.md docs/*.md; do
            n=$(grep -n '^```' "$f" | wc -l | tr -d ' ')
            if [ $((n % 2)) -ne 0 ]; then
              echo "unclosed fence: $f ($n)"
              exit 1
            fi
          done
      - name: Render Kubernetes dev overlay
        run: kubectl kustomize k8s/overlays/dev >/tmp/realtime-lab-dev.yaml
      - name: Render Kubernetes prod-like overlay
        run: kubectl kustomize k8s/overlays/prod-like >/tmp/realtime-lab-prod-like.yaml
