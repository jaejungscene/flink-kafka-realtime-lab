apiVersion: v1
kind: ServiceAccount
metadata:
  name: flink
  namespace: realtime-lab
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flink
  namespace: realtime-lab
rules:
  - apiGroups: [ "" ]
    resources: [ "pods", "services", "configmaps", "events" ]
    verbs: [ "*" ]
  - apiGroups: [ "apps" ]
    resources: [ "deployments" ]
    verbs: [ "*" ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flink
  namespace: realtime-lab
subjects:
  - kind: ServiceAccount
    name: flink
roleRef:
  kind: Role
  name: flink
  apiGroup: rbac.authorization.k8s.io
